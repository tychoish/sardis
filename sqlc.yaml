version: "2"
sql:
  - engine: "sqlite"
    queries: "shbot/query.sql"
    schema: ["../fasolaminutes_parsing/minutes_schema.sql", "shbot/views.sql"]
    gen:
      go:
        package: "shbot"
        emit_pointers_for_null_types: true
        out: "shbot"
        json_tags_case_style: true
        initialisms: ["id", "url"]
